<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>インテリアコーディネーター過去問道場</title>
    <meta
      name="description"
      content="インテリアコーディネーター試験の問題を一問一答で学べる学習サイト。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Interior Coordinator Study Dojo</p>
        <div class="hero-copy">
          <div>
            <h1>インテリアコーディネーター<br />過去問道場</h1>
            <p class="hero-lead">
              インテリアコーディネーター試験の過去問を、一問一答で学べる学習サイトです。
              巻ごと・章ごとに絞り込みながら、問題と答えをテンポよく確認できます。
            </p>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="control-panel">
          <section class="panel-block">
            <h2>出題設定</h2>
            <label class="field">
              <span>巻</span>
              <select id="volume-filter"></select>
            </label>
            <label class="field">
              <span>章</span>
              <select id="chapter-filter"></select>
            </label>
            <label class="field">
              <span>表示モード</span>
              <select id="mode-filter">
                <option value="all">すべて</option>
                <option value="bookmarked">ブックマークのみ</option>
                <option value="incorrect">間違えた問題のみ</option>
              </select>
            </label>
            <label class="field">
              <span>キーワード検索</span>
              <input id="search-input" type="search" placeholder="例: マーケティング" />
            </label>
            <label class="toggle">
              <input id="shuffle-toggle" type="checkbox" />
              <span>シャッフル出題</span>
            </label>
            <button id="reset-progress" class="ghost-button" type="button">学習記録をリセット</button>
          </section>

        </aside>

        <section class="quiz-stage">
          <div class="quiz-toolbar">
            <div class="badge-row">
              <span id="volume-badge" class="badge">-</span>
              <span id="chapter-badge" class="badge">-</span>
              <span id="exam-badge" class="badge accent">-</span>
            </div>
            <button id="bookmark-button" class="ghost-button" type="button">☆ 保存</button>
          </div>

          <article class="question-card">
            <p id="question-id" class="question-id">-</p>
            <h2 id="question-text" class="question-text">読み込み中...</h2>
            <div id="options" class="options" role="list"></div>

            <div class="question-actions">
              <button id="reveal-button" class="primary-button" type="button">答えを見る</button>
              <button id="prev-button" class="ghost-button" type="button">前へ</button>
              <button id="next-button" class="ghost-button" type="button">次へ</button>
            </div>

            <section id="answer-panel" class="answer-panel hidden">
              <div class="answer-header">
                <p class="answer-label">正答</p>
                <strong id="answer-text">-</strong>
              </div>
            </section>
          </article>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
